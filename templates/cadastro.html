<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="{{ url_for ('static', filename='style.css') }}">
</head>
<body>
    <div id="card-text">
        <div id="icon">
            <img src="{{ url_for('static', filename='icons/adicionar-usuario.png') }}" alt="ícone">
        </div>
        <h1>Criar Conta</h1>
        <p>Insira suas informações para começar</p>
        <form action="/cadastro" method="post">
            <label for="nome">Nome</label><br>
            <input type="text" id="nome" name="nome" required><br>
            <label for="email">E-mail</label><br>
            <input type="email" id="email" name="email" required><br>
            <label for="senha">Senha</label><br>
            <input type="password" id="senha" name="senha" required><br>
            <label for="confirmar_senha">Confirmar Senha</label><br>
            <input type="password" id="confirmar_senha" name="confirmar_senha" required><br>
            <input type="submit" value="Criar Conta">
        </form>
        <p id="return_login">Já tem uma conta? <a href="{{ url_for('auth.login') }}">Entrar</a></p>
    </div>
</body>
</html>
